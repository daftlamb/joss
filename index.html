<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Joss — 焚香计时</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f4ef;
  --surface:#eeeae2;
  --border:#d8d0c0;
  --text:#2a2418;
  --muted:#9a8e7a;
  --accent:#8a5c30;
  --accent2:#b07840;
  --smoke:#8a7a68;
  --ember:#e84020;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  font-weight:300;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  user-select:none;
}

/* Header */
header{
  position:fixed;top:0;left:0;right:0;
  height:48px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  background:rgba(247,244,239,.92);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
  z-index:100;
}
.brand{font-size:15px;font-weight:500;letter-spacing:.02em}
.brand span{color:var(--accent)}
.header-right{display:flex;gap:10px;align-items:center}
.btn-icon{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;padding:4px 10px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-icon:hover{color:var(--text);border-color:var(--muted)}
.stats-pill{font-size:10px;color:var(--muted);letter-spacing:.04em}

/* Main scene */
#scene{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
  position:relative;
  width:320px;
  height:520px;
  margin-top:48px;
}

/* Canvas for smoke + ember */
#smoke-canvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
}

/* Incense stick */
.incense-wrap{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
  z-index:2;
}
#stick-container{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
}
#stick-ash{
  width:3px;
  border-radius:2px 2px 0 0;
  background:linear-gradient(to bottom, #aaa 0%, #c8c0b0 40%, #ddd8ce 100%);
  transition:height .5s ease;
}
#stick-body{
  width:3px;
  border-radius:0;
  background:linear-gradient(to bottom, #8b6914 0%, #a07828 50%, #7a5c10 100%);
  transition:height .3s linear;
}
#stick-tip{
  width:5px;height:5px;
  border-radius:50%;
  background:var(--ember);
  box-shadow:0 0 6px 3px rgba(220,60,10,.5), 0 0 12px 6px rgba(220,100,20,.2);
  transition:opacity .5s;
  margin:0 auto;
  flex-shrink:0;
}

/* Holder */
.holder-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:4px;
  position:relative;
}
#taihu-svg-wrap{
  position:relative;
  width:120px;
  height:160px;
  overflow:visible;
}
#taihu-svg{
  width:120px;
  height:160px;
  display:block;
}

.holder-dish::after{
  content:'';
  width:4px;height:8px;
  background:#2a2018;
  border-radius:1px;
  position:absolute;top:3px;
}
.holder-ash-pile{
  width:18px;
  height:0;
  background:linear-gradient(to top, #bbb 0%, #ddd 100%);
  border-radius:50% 50% 0 0;
  transition:height .5s ease;
  margin:-6px auto 0;
  position:relative;
  z-index:3;
}

/* Time display */
.time-display{
  margin-top:32px;
  text-align:center;
}
.time-big{
  font-size:42px;
  font-weight:300;
  letter-spacing:.06em;
  color:var(--text);
  font-variant-numeric:tabular-nums;
  line-height:1;
}
.time-label{
  font-size:11px;
  color:var(--muted);
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-top:6px;
  font-family:'Noto Serif SC',serif;
}

/* Duration selector */
.duration-selector{
  display:flex;
  gap:8px;
  margin-top:24px;
  flex-wrap:wrap;
  justify-content:center;
}
.dur-btn{
  background:none;
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--muted);
  font-family:'Noto Serif SC',serif;
  font-size:12px;
  padding:8px 14px;
  cursor:pointer;
  transition:all .2s;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  min-width:52px;
}
.dur-btn .dur-en{font-size:10px;font-family:'Outfit',sans-serif;opacity:.6}
.dur-btn:hover{border-color:var(--accent);color:var(--accent)}
.dur-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(200,133,74,.08)}

/* Controls */
.controls{
  display:flex;
  gap:12px;
  margin-top:24px;
  align-items:center;
}
.btn-main{
  background:var(--accent);
  border:none;
  border-radius:10px;
  color:#1a1610;
  font-family:'Outfit',sans-serif;
  font-size:13px;
  font-weight:500;
  padding:12px 32px;
  cursor:pointer;
  transition:all .2s;
  letter-spacing:.04em;
}
.btn-main:hover{background:var(--accent2)}
.btn-main:disabled{opacity:.4;cursor:not-allowed}
.btn-sec{
  background:none;
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--muted);
  font-family:'Outfit',sans-serif;
  font-size:12px;
  padding:12px 20px;
  cursor:pointer;
  transition:all .2s;
}
.btn-sec:hover{border-color:var(--muted);color:var(--text)}

/* Slogan */
.slogan{
  position:fixed;
  bottom:24px;
  font-size:11px;
  color:var(--muted);
  letter-spacing:.1em;
  font-family:'Noto Serif SC',serif;
  opacity:.6;
}

/* Done overlay */
#done-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(26,22,16,.92);
  z-index:200;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:16px;
}
#done-overlay.show{display:flex}
.done-title{font-size:22px;font-weight:300;color:var(--text);letter-spacing:.06em;font-family:'Noto Serif SC',serif}
.done-sub{font-size:12px;color:var(--muted);letter-spacing:.08em}
.done-stats{font-size:11px;color:var(--accent);letter-spacing:.06em;margin-top:4px}

/* Holder style variants */
.holder-wrap.style-cone .holder-dish{
  width:40px;height:40px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%, #6a5a3a, #2a2018);
}
.holder-wrap.style-plate .holder-dish{
  width:80px;height:8px;border-radius:4px;
  background:linear-gradient(to bottom, #6a5a3a, #3a3020);
}
</style>
</head>

  <div class="brand">J<span>oss</span></div>

    <span class="stats-pill" id="stats-pill">今日 0 炷 · 0 min</span>

  <div class="time-label" id="time-label">小坐 · 等待点燃</div>
</div>

<div class="duration-selector">
  <button class="dur-btn" data-min="10"><span>小坐</span><span class="dur-en">10 min</span></button>
  <button class="dur-btn active" data-min="25"><span>一刻</span><span class="dur-en">25 min</span></button>
  <button class="dur-btn" data-min="45"><span>半晌</span><span class="dur-en">45 min</span></button>
  <button class="dur-btn" data-min="60"><span>一炉</span><span class="dur-en">60 min</span></button>
  <button class="dur-btn" data-min="90"><span>长思</span><span class="dur-en">90 min</span></button>
</div>

<div class="controls">
  <button class="btn-main" id="btn-start">点燃</button>
  <button class="btn-sec" id="btn-reset" style="display:none">熄灭</button>
</div>

<div class="slogan">以一炷香，度量一段专注。</div>

<!-- Done overlay -->
<div id="done-overlay">
  <div class="done-title">香尽</div>
  <div class="done-sub">专注时间结束</div>
  <div class="done-stats" id="done-stats"></div>
  <button class="btn-main" id="btn-done-close" style="margin-top:16px">再燃一炷</button>
</div>

<script>
// ---- State ----
var totalSec = 25 * 60;
var remainSec = totalSec;
var running = false;
var paused = false;
var timer = null;
var todayCount = parseInt(localStorage.getItem('inc_count')||'0');
var todayMin = parseInt(localStorage.getItem('inc_min')||'0');

// Stick dimensions
var STICK_MAX_H = 200;  // px full body
var ASH_MAX_H = 0;

// DOM refs
var timeDisplay = document.getElementById('time-display');
var timeLabel = document.getElementById('time-label');
var stickBody = document.getElementById('stick-body');
var stickAsh = document.getElementById('stick-ash');
var stickTip = document.getElementById('stick-tip');
var ashPile = document.getElementById('ash-pile');
var btnStart = document.getElementById('btn-start');
var btnReset = document.getElementById('btn-reset');
var doneOverlay = document.getElementById('done-overlay');
var doneStats = document.getElementById('done-stats');
var statsPill = document.getElementById('stats-pill');

// Duration names
var DUR_NAMES = {10:'小坐',25:'一刻',45:'半晌',60:'一炉',90:'长思'};

// ---- Duration selector ----
var selectedMin = 25;
document.querySelectorAll('.dur-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    if (running) return;
    document.querySelectorAll('.dur-btn').forEach(function(b){b.classList.remove('active');});
    this.classList.add('active');
    selectedMin = parseInt(this.dataset.min);
    totalSec = selectedMin * 60;
    remainSec = totalSec;
    updateTimeDisplay();
    resetStick();
    timeLabel.textContent = (DUR_NAMES[selectedMin]||selectedMin+' min') + ' · 等待点燃';
  });
});

// ---- Time display ----
function updateTimeDisplay() {
  var m = Math.floor(remainSec / 60);
  var s = remainSec % 60;
  timeDisplay.textContent = (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
}

// ---- Stick visual ----
function updateStick() {
  var progress = 1 - remainSec / totalSec;  // 0→1
  var bodyH = Math.round(STICK_MAX_H * (1 - progress));
  var ashH = Math.round(STICK_MAX_H * progress);
  var pileH = Math.round(ashH * 0.12);
  stickBody.style.height = bodyH + 'px';
  stickAsh.style.height = ashH + 'px';
  ashPile.style.height = Math.min(pileH, 18) + 'px';
}

function resetStick() {
  stickBody.style.height = STICK_MAX_H + 'px';
  stickAsh.style.height = '0px';
  ashPile.style.height = '0px';
  stickTip.style.opacity = '0';
  resetAsh();
}

// ---- Timer ----
function startTimer() {
  running = true;
  paused = false;
  stickTip.style.opacity = '1';
  btnStart.textContent = '暂停';
  btnReset.style.display = '';
  document.querySelectorAll('.dur-btn').forEach(function(b){b.style.opacity='.4';b.style.pointerEvents='none';});
  timeLabel.textContent = (DUR_NAMES[selectedMin]||selectedMin+' min') + ' · 专注中';
  smokeActive = true;
  tick();
}

function pauseTimer() {
  paused = true;
  running = false;
  clearTimeout(timer);
  btnStart.textContent = '继续';
  timeLabel.textContent = (DUR_NAMES[selectedMin]||selectedMin+' min') + ' · 已暂停';
  smokeActive = false;
}

function resumeTimer() {
  running = true;
  paused = false;
  btnStart.textContent = '暂停';
  timeLabel.textContent = (DUR_NAMES[selectedMin]||selectedMin+' min') + ' · 专注中';
  smokeActive = true;
  tick();
}

function resetTimer() {
  running = false;
  paused = false;
  clearTimeout(timer);
  remainSec = totalSec;
  smokeActive = false;
  updateTimeDisplay();
  resetStick();
  btnStart.textContent = '点燃';
  btnReset.style.display = 'none';
  document.querySelectorAll('.dur-btn').forEach(function(b){b.style.opacity='';b.style.pointerEvents='';});
  timeLabel.textContent = (DUR_NAMES[selectedMin]||selectedMin+' min') + ' · 等待点燃';
  smokePoints = [];
}

function tick() {
  if (!running) return;
  timer = setTimeout(function() {
    remainSec--;
    updateTimeDisplay();
    updateStick();
    if (remainSec <= 0) {
      finishTimer();
    } else {
      tick();
    }
  }, 1000);
}

function finishTimer() {
  running = false;
  smokeActive = false;
  stickTip.style.opacity = '0';
  stickBody.style.height = '0px';
  stickAsh.style.height = STICK_MAX_H + 'px';
  ashPile.style.height = '18px';
  // Stats
  todayCount++;
  todayMin += selectedMin;
  localStorage.setItem('inc_count', todayCount);
  localStorage.setItem('inc_min', todayMin);
  updateStats();
  // Done overlay
  doneStats.textContent = '今日已专注 ' + todayCount + ' 炷 · 共 ' + todayMin + ' 分钟';
  setTimeout(function() {
    doneOverlay.classList.add('show');
  }, 800);
}

function updateStats() {
  statsPill.textContent = '今日 ' + todayCount + ' 炷 · ' + todayMin + ' min';
}
updateStats();
updateTimeDisplay();
resetStick();
stickTip.style.opacity = '0';

// ---- Button handlers ----
btnStart.addEventListener('click', function() {
  if (!running && !paused) startTimer();
  else if (running) pauseTimer();
  else if (paused) resumeTimer();
});

btnReset.addEventListener('click', function() {
  if (confirm('熄灭这炷香？')) resetTimer();
});

document.getElementById('btn-done-close').addEventListener('click', function() {
  doneOverlay.classList.remove('show');
  resetTimer();
});

// ---- Ash particle system ----
var ashParticles = [];
var ashHeap = null;
var ASH_HEAP_W = 80;
var ashSpawnAcc = 0;

function initAshHeap() { ashHeap = new Float32Array(ASH_HEAP_W); }
initAshHeap();
var ashChunkAcc = 0;        // accumulating ash length (px)
var ashChunkThresh = 10 + Math.random()*8; // threshold before next break

function resetAsh() {
  ashParticles = [];
  initAshHeap();
  ashChunkAcc = 0;
  ashChunkThresh = 10 + Math.random()*8;
}

// Drop a whole chunk of ash at once
function dropAshChunk(ex, ey) {
  var count = 18 + Math.floor(Math.random()*16);
  var chunkVx = (Math.random()-0.5)*0.3; // slight shared drift
  for (var i=0; i<count; i++) {
    ashParticles.push({
      x: ex + (Math.random()-0.5)*2.5,
      y: ey + (Math.random()-0.5)*3,
      vx: chunkVx + (Math.random()-0.5)*0.4,
      vy: 0.3 + Math.random()*0.5, // initial downward velocity (chunk has weight)
      size: 0.8 + Math.random()*1.4,
      alpha: 0.5 + Math.random()*0.4,
      settled: false,
      wobble: Math.random()*Math.PI*2,
      wobbleAmp: 0.15 + Math.random()*0.25 // chunk wobbles less than single mote
    });
  }
  ashChunkThresh = 8 + Math.random()*12; // next threshold
  ashChunkAcc = 0;
}

function updateDrawAsh(ctx, cw, ch) {
  var groundY = ch - 10;
  for (var i = ashParticles.length-1; i >= 0; i--) {
    var a = ashParticles[i];
    if (a.settled) continue;
    a.vy += 0.012 + Math.random()*0.006;
    a.wobble += 0.08;
    a.x += a.vx + Math.sin(a.wobble)*a.wobbleAmp + windForce;
    a.y += a.vy;
    var hcx = cw/2;
    var hi = Math.round(a.x - hcx + ASH_HEAP_W/2);
    hi = Math.max(0, Math.min(ASH_HEAP_W-1, hi));
    var pileTop = groundY - ashHeap[hi];
    if (a.y >= pileTop) {
      a.y = pileTop; a.settled = true;
      for (var di=-2; di<=2; di++) {
        var i2=hi+di;
        if (i2>=0 && i2<ASH_HEAP_W) ashHeap[i2] += (0.8-Math.abs(di)*0.3)*a.size*0.4;
      }
      for (var hi2=0; hi2<ASH_HEAP_W; hi2++) ashHeap[hi2]=Math.min(ashHeap[hi2],30);
    }
  }
  if (ashParticles.length > 500) {
    ashParticles = ashParticles.filter(function(a){return !a.settled;}).slice(-250);
  }
  // Draw heap
  var hcx = cw/2;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(hcx-ASH_HEAP_W/2-2, groundY);
  for (var xi=0; xi<ASH_HEAP_W; xi++) {
    var px=hcx-ASH_HEAP_W/2+xi, py=groundY-ashHeap[xi];
    if (xi===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.lineTo(hcx+ASH_HEAP_W/2+2, groundY);
  ctx.closePath();
  var hg=ctx.createLinearGradient(0,groundY-30,0,groundY);
  hg.addColorStop(0,'rgba(205,200,192,0.85)');
  hg.addColorStop(1,'rgba(180,174,166,0.6)');
  ctx.fillStyle=hg; ctx.fill();
  // Draw falling motes
  for (var i=0; i<ashParticles.length; i++) {
    var a=ashParticles[i]; if(a.settled) continue;
    ctx.beginPath();
    ctx.arc(a.x,a.y,a.size,0,Math.PI*2);
    ctx.fillStyle='rgba(212,207,198,'+a.alpha+')';
    ctx.fill();
  }
  ctx.restore();
}

// ---- Smoke — single continuous rising thread ----
var smokeCanvas = document.getElementById('smoke-canvas');
var smokeCtx = smokeCanvas.getContext('2d');
var smokeActive = false;

// Smoke is represented as an array of points forming a rising thread
// Each point drifts upward and sideways gently
var smokePoints = [];   // [{x,y,age}]
var SMOKE_MAX_PTS = 120;
var smokeSpawnAcc = 0;

function resizeSmokeCanvas() {
  var scene = document.getElementById('scene');
  smokeCanvas.width = scene.offsetWidth;
  smokeCanvas.height = scene.offsetHeight;
}
resizeSmokeCanvas();
window.addEventListener('resize', resizeSmokeCanvas);

function getEmberPos() {
  var sceneEl = document.getElementById('scene');
  var tipEl = document.getElementById('stick-tip');
  var sceneRect = sceneEl.getBoundingClientRect();
  var tipRect = tipEl.getBoundingClientRect();
  return {
    x: tipRect.left - sceneRect.left + tipRect.width/2,
    y: tipRect.top - sceneRect.top + tipRect.height/2
  };
}

var smokeT = 0;
var turbulence = 0;
var turbTimer = 0;
var turbTarget = 0;
var windForce = 0;
var windTimer = 1800 + Math.floor(Math.random()*3600); // first gust in 30-90s
var windActive = false;
var windDuration = 0;
var windTarget = 0;

function animateSmoke() {
  smokeCtx.clearRect(0, 0, smokeCanvas.width, smokeCanvas.height);
  smokeT += 0.007;

  // Wind gust system — random gust every 1-2 min, lasts ~3-6s
  windTimer--;
  if (windTimer <= 0) {
    // Random interval: 60-120 seconds at 60fps = 3600-7200 frames
    windTimer = 3600 + Math.random() * 3600;
    windActive = true;
    windDuration = 180 + Math.random() * 180; // 3-6s at 60fps
    windTarget = (Math.random() > 0.5 ? 1 : -1) * (8 + Math.random() * 14);
  }
  if (windActive) {
    windDuration--;
    if (windDuration <= 0) { windActive = false; windTarget = 0; }
  }
  turbulence += (windTarget - turbulence) * 0.018;
  windForce = turbulence * 0.35; // ash gets blown more than smoke

  // Legacy turbulence for smoke
  turbTimer--;
  if (turbTimer <= 0) {
    turbTimer = 120 + Math.random() * 200;
    turbTarget = windActive ? windTarget : (Math.random() - 0.5) * 8;
  }

  if (smokeActive && running) {
    var pos = getEmberPos();
    smokeSpawnAcc++;
    if (smokeSpawnAcc >= 3) {
      smokeSpawnAcc = 0;
      smokePoints.unshift({
        x: pos.x, y: pos.y, age: 0, baseX: pos.x,
        ph1: Math.random()*Math.PI*2, ph2: Math.random()*Math.PI*2, ph3: Math.random()*Math.PI*2,
        amp: 0.6+Math.random()*0.8, riseSpeed: 0.15+Math.random()*0.08
      });
      if (smokePoints.length > SMOKE_MAX_PTS) smokePoints.pop();
    }
    // Spawn ash every ~8 frames
    ashSpawnAcc++;
    // Ash accumulates on the burning tip; chunk drops when threshold reached
    ashChunkAcc += 0.018; // accumulate slowly with time
    if (ashChunkAcc >= ashChunkThresh) {
      dropAshChunk(pos.x, pos.y + 3);
    }
  }
  updateDrawAsh(smokeCtx, smokeCanvas.width, smokeCanvas.height);

  for (var i = 0; i < smokePoints.length; i++) {
    var pt = smokePoints[i];
    pt.age++;
    // Non-uniform rise
    pt.y -= pt.riseSpeed;
    // Multi-frequency drift: 3 sin waves with different speeds + turbulence
    // Older points (larger i) drift further from center
    var spread = 1 + i * 0.06;
    var w1 = Math.sin(smokeT * 1.1  + pt.ph1 + i * 0.15) * 0.5 * pt.amp;
    var w2 = Math.sin(smokeT * 0.43 + pt.ph2 + i * 0.09) * 0.9 * pt.amp;
    var w3 = Math.sin(smokeT * 2.3  + pt.ph3 + i * 0.21) * 0.2 * pt.amp;
    pt.x = pt.baseX + (w1 + w2 + w3) * spread + turbulence * (i / SMOKE_MAX_PTS);
  }

  while (smokePoints.length > 0 && smokePoints[smokePoints.length-1].y < -10) {
    smokePoints.pop();
  }

  if (smokePoints.length > 2) {
    smokeCtx.save();
    smokeCtx.lineCap = 'round';
    smokeCtx.lineJoin = 'round';

    for (var j = 1; j < smokePoints.length; j++) {
      var p0 = smokePoints[j-1];
      var p1 = smokePoints[j];
      var frac = j / smokePoints.length;
      // Opacity: dense near base, fades out early (more natural dissipation)
      var alpha = Math.max(0, (1 - frac * 1.2) * 0.2);
      // Width: thin at base, widens as smoke rises and disperses
      var lw = 0.6 + frac * 3.5;

      var mx = (p0.x + p1.x) / 2;
      var my = (p0.y + p1.y) / 2;
      smokeCtx.beginPath();
      smokeCtx.moveTo(p0.x, p0.y);
      smokeCtx.quadraticCurveTo(p0.x, p0.y, mx, my);
      smokeCtx.strokeStyle = 'rgba(110,100,85,'+alpha+')';
      smokeCtx.lineWidth = lw;
      smokeCtx.stroke();
    }
    smokeCtx.restore();
  }

  requestAnimationFrame(animateSmoke);
}
animateSmoke();

// ---- Taihu SVG — compute hole position for stick alignment ----
// SVG viewBox: 0 0 481.36 661.74, stone top peak ~(315, 0)
// The stone top in the SVG is near x=315, y=0 (top of stone body path)
// The SVG is rendered at 120x160px, so scale factors:
// scaleX = 120/481.36 = 0.2493, scaleY = 160/661.74 = 0.2418
// Stone top peak: SVG x≈315.47, y≈0 → rendered x≈78.6, y≈0
// We set taihuHolePos after layout so smoke origin is correct
(function() {
  function computeHolePos() {
    var svgEl = document.getElementById('taihu-svg');
    if (!svgEl) return;
    var rect = svgEl.getBoundingClientRect();
    var sceneRect = document.getElementById('scene').getBoundingClientRect();
    // Stone top peak in SVG coords: x≈315.47/481.36 ≈ 65.5% width, y≈0/661.74 ≈ 0%
    var hx = rect.left - sceneRect.left + rect.width * 0.656;
    var hy = rect.top  - sceneRect.top  + rect.height * 0.02;
    window.taihuHolePos = {x: hx, y: hy};
  }
  window.addEventListener('load', computeHolePos);
  window.addEventListener('resize', computeHolePos);
  setTimeout(computeHolePos, 200);
})();

// ---- Ember glow pulse ----
var emberEl = document.getElementById('stick-tip');
var emberT = 0;
function pulseEmber() {
  if (running) {
    emberT += 0.05;
    var glow = 4 + Math.sin(emberT)*2;
    var glow2 = 8 + Math.sin(emberT)*3;
    emberEl.style.boxShadow = '0 0 '+glow+'px '+(glow/2)+'px rgba(255,80,20,.6), 0 0 '+glow2+'px '+(glow2/2)+'px rgba(255,120,30,.25)';
  }
  requestAnimationFrame(pulseEmber);
}
pulseEmber();
</script>
</body>
</html>
